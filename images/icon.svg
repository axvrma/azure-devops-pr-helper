<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005a9e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="prGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6e6e6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="20" ry="20" fill="url(#bgGradient)"/>
  
  <!-- Git branch lines -->
  <g stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round">
    <!-- Main branch (vertical) -->
    <line x1="44" y1="30" x2="44" y2="98"/>
    
    <!-- Feature branch -->
    <path d="M 44 50 Q 64 50 74 65 Q 84 80 84 98"/>
    
    <!-- Merge arrow -->
    <path d="M 74 75 L 54 85 L 54 75"/>
  </g>
  
  <!-- Branch nodes -->
  <circle cx="44" cy="30" r="8" fill="#ffffff"/>
  <circle cx="44" cy="98" r="8" fill="#ffffff"/>
  <circle cx="84" cy="98" r="8" fill="#ffffff"/>
  
  <!-- PR merge indicator -->
  <circle cx="44" cy="65" r="6" fill="#50e3c2"/>
  
  <!-- AI sparkle -->
  <g fill="#ffd700" transform="translate(90, 25)">
    <polygon points="10,0 12,7 20,7 14,12 16,20 10,15 4,20 6,12 0,7 8,7"/>
  </g>
</svg>
